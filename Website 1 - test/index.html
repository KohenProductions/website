<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ron Kohen — Creator</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #FAFAF8;
      --bg-2:       #F2F0EB;
      --bg-3:       #E8E4DC;
      --border:     rgba(0,0,0,0.09);
      --text:       #1A1916;
      --muted:      #8A8780;
      --accent:     #B8782A;
      --font:       'Satoshi', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: transparent;
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Silk background canvas ── */
    #silk-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
    }
    /* Everything above the silk canvas */
    nav, main, footer, .cursor, .cursor-ring {
      position: relative;
      z-index: 1;
    }

    /* ── Cursor ── */
    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: multiply;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1.5px solid rgba(184,120,42,0.45);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
    }
    @media (hover: none) { .cursor, .cursor-ring { display: none; } }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2.5rem;
      background: rgba(250,250,248,0.6);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .hero-text {
      font-size: clamp(2.75rem, 7vw, 6.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--text);
    }

    /* Each character wrapper — needed for the split animation */
    .split-char {
      display: inline-block;
      will-change: transform, opacity;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 10px; }
  </style>
</head>
<body>

  <!-- Silk WebGL background -->
  <canvas id="silk-bg"></canvas>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Nav -->
  <nav>
    <a href="#" class="nav-logo">Ron<span>.</span>Kohen</a>
    <ul class="nav-links"></ul>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <h1 class="hero-text" id="heroText">let's make your ai commercial</h1>
  </section>

  <!-- GSAP -->
  <script src="node_modules/gsap/dist/gsap.min.js"></script>
  <script src="node_modules/gsap/dist/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* ─────────────────────────────────────────────────
       SILK  — exact React Bits shader, raw WebGL port
       Source: reactbits.dev/backgrounds/silk
    ───────────────────────────────────────────────── */
    (function initSilk({
      speed          = 5,
      scale          = 1,
      color          = '#C8BCA8',
      noiseIntensity = 1.5,
      rotation       = 0
    } = {}) {
      const canvas = document.getElementById('silk-bg');
      const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if (!gl) { console.error('WebGL not supported'); return; }

      // Vertex shader passes vUv (0→1) matching the React Bits original
      const vert = `
        attribute vec2 a_pos;
        varying vec2 vUv;
        void main() {
          vUv = a_pos * 0.5 + 0.5;
          gl_Position = vec4(a_pos, 0.0, 1.0);
        }
      `;

      // Exact fragment shader from React Bits Silk
      const frag = `
        precision highp float;
        varying vec2 vUv;
        uniform float uTime;
        uniform vec3  uColor;
        uniform float uSpeed;
        uniform float uScale;
        uniform float uRotation;
        uniform float uNoiseIntensity;

        const float e = 2.71828182845904523536;

        float noise(vec2 texCoord) {
          float G = e;
          vec2  r = (G * sin(G * texCoord));
          return fract(r.x * r.y * (1.0 + texCoord.x));
        }

        vec2 rotateUvs(vec2 uv, float angle) {
          float c = cos(angle);
          float s = sin(angle);
          mat2  rot = mat2(c, -s, s, c);
          return rot * uv;
        }

        void main() {
          float rnd     = noise(gl_FragCoord.xy);
          vec2  uv      = rotateUvs(vUv * uScale, uRotation);
          vec2  tex     = uv * uScale;
          float tOffset = uSpeed * uTime;

          tex.y += 0.03 * sin(8.0 * tex.x - tOffset);

          float pattern = 0.6 +
            0.4 * sin(5.0 * (tex.x + tex.y +
              cos(3.0 * tex.x + 5.0 * tex.y) +
              0.02 * tOffset) +
              sin(20.0 * (tex.x + tex.y - 0.1 * tOffset)));

          vec4 col = vec4(uColor, 1.0) * vec4(pattern) - rnd / 15.0 * uNoiseIntensity;
          col.a = 1.0;
          gl_FragColor = col;
        }
      `;

      function compileShader(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
          console.error('Shader error:', gl.getShaderInfoLog(s));
        return s;
      }

      const prog = gl.createProgram();
      gl.attachShader(prog, compileShader(gl.VERTEX_SHADER,   vert));
      gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, frag));
      gl.linkProgram(prog);
      gl.useProgram(prog);

      // Full-screen quad
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
      const posLoc = gl.getAttribLocation(prog, 'a_pos');
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

      // Parse hex color
      const hex = color.replace('#','');
      const r = parseInt(hex.slice(0,2),16)/255;
      const g = parseInt(hex.slice(2,4),16)/255;
      const b = parseInt(hex.slice(4,6),16)/255;

      // Uniforms
      const uTime          = gl.getUniformLocation(prog, 'uTime');
      const uColor         = gl.getUniformLocation(prog, 'uColor');
      const uSpeed         = gl.getUniformLocation(prog, 'uSpeed');
      const uScale         = gl.getUniformLocation(prog, 'uScale');
      const uRotation      = gl.getUniformLocation(prog, 'uRotation');
      const uNoiseIntensity= gl.getUniformLocation(prog, 'uNoiseIntensity');

      gl.uniform3f(uColor, r, g, b);
      gl.uniform1f(uSpeed, speed);
      gl.uniform1f(uScale, scale);
      gl.uniform1f(uRotation, rotation);
      gl.uniform1f(uNoiseIntensity, noiseIntensity);

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);
      }
      resize();
      window.addEventListener('resize', resize);

      const t0 = performance.now();
      (function loop() {
        requestAnimationFrame(loop);
        gl.uniform1f(uTime, (performance.now() - t0) * 0.001);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      })();
    })();


    /* ─────────────────────────────────────────────────
       SPLIT TEXT  — vanilla GSAP port of React Bits SplitText
       Splits text into char <span>s and stagger-animates in
    ───────────────────────────────────────────────── */
    (function initSplitText() {
      const el = document.getElementById('heroText');
      const originalText = el.textContent;

      // Split into character spans (preserve spaces)
      el.innerHTML = originalText
        .split('')
        .map(ch => ch === ' '
          ? '<span class="split-char" style="display:inline-block;width:0.3em"> </span>'
          : `<span class="split-char">${ch}</span>`)
        .join('');

      const chars = el.querySelectorAll('.split-char');

      document.fonts.ready.then(() => {
        gsap.fromTo(chars,
          { opacity: 0, y: 48, rotateX: -90 },
          {
            opacity: 1,
            y: 0,
            rotateX: 0,
            duration: 1,
            ease: 'power3.out',
            stagger: 0.028,
            delay: 0.4,
            transformOrigin: '0% 50%',
            force3D: true
          }
        );
      });
    })();


    /* ─────────────────────────────────────────────────
       CUSTOM CURSOR
    ───────────────────────────────────────────────── */
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('cursorRing');
    const xCursor = gsap.quickTo(cursor, 'x', { duration: 0.05, ease: 'none' });
    const yCursor = gsap.quickTo(cursor, 'y', { duration: 0.05, ease: 'none' });
    const xRing   = gsap.quickTo(ring,   'x', { duration: 0.35, ease: 'power3.out' });
    const yRing   = gsap.quickTo(ring,   'y', { duration: 0.35, ease: 'power3.out' });
    gsap.set([cursor, ring], { xPercent: -50, yPercent: -50, left: 0, top: 0 });

    document.addEventListener('mousemove', e => {
      xCursor(e.clientX); yCursor(e.clientY);
      xRing(e.clientX);   yRing(e.clientY);
    });
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        gsap.to(cursor, { scale: 2.5, duration: 0.25, ease: 'power2.out' });
        gsap.to(ring,   { scale: 1.5, opacity: 0.5, duration: 0.35 });
      });
      el.addEventListener('mouseleave', () => {
        gsap.to(cursor, { scale: 1, duration: 0.25, ease: 'power2.out' });
        gsap.to(ring,   { scale: 1, opacity: 1, duration: 0.35 });
      });
    });

    /* ── Nav entrance */
    gsap.from('nav', { y: -60, opacity: 0, duration: 0.7, ease: 'power3.out', delay: 0.1 });
  </script>
</body>
</html>
